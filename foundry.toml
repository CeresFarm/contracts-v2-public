[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
evm_version = "osaka"
optimizer = true
optimizer_runs = 200
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]

# Invariant fuzzing settings
# Run with: forge test --match-path "test/invariant/**" --profile invariant
[profile.invariant]
runs   = 256
depth  = 500
fail_on_revert = false  # absorbed reverts don't fail the run; only invariant violations do

[lint]
severity = ["low"]
skip = ["*.t.sol"]

[dependencies]
"@openzeppelin-contracts" = "5.3.0"
morpho-org-morpho-blue = "1.0.0"
forge-std = "1.11.0"
"@openzeppelin-contracts-upgradeable" = "5.3.0"
openzeppelin-foundry-upgrades = "0.4.0"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
